<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insurance Quote Automation Report</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f4f8; color: #222; font-size: 14px; }

    /* ── Header ─────────────────────────────────────────── */
    .header { background: linear-gradient(135deg, #1F4E79, #2E75B6); color: #fff; padding: 24px 32px; }
    .header h1 { font-size: 22px; font-weight: 700; letter-spacing: 0.5px; }
    .header .subtitle { font-size: 13px; opacity: 0.8; margin-top: 4px; }
    .run-meta { display: flex; gap: 32px; margin-top: 16px; flex-wrap: wrap; }
    .run-meta span { font-size: 12px; opacity: 0.85; }
    .run-meta strong { opacity: 1; color: #fff; }

    /* ── Summary bar ──────────────────────────────────────── */
    .summary { display: flex; gap: 12px; padding: 16px 32px; background: #fff; border-bottom: 1px solid #dde3ec; flex-wrap: wrap; }
    .stat { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 6px; font-weight: 600; font-size: 15px; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
    .stat:hover { filter: brightness(0.95); }
    .stat.active { border-color: #1F4E79; }
    .stat .dot { width: 10px; height: 10px; border-radius: 50%; }
    .stat.all  { background: #EEF2F8; color: #1F4E79; }
    .stat.pass { background: #E8F5E9; color: #2E7D32; }
    .stat.pass .dot { background: #43A047; }
    .stat.fail { background: #FFEBEE; color: #C62828; }
    .stat.fail .dot { background: #E53935; }
    .stat.skip { background: #FFF8E1; color: #F57F17; }
    .stat.skip .dot { background: #FFB300; }

    /* ── Toolbar ───────────────────────────────────────────── */
    .toolbar { display: flex; align-items: center; gap: 12px; padding: 12px 32px; background: #fff; border-bottom: 1px solid #dde3ec; flex-wrap: wrap; }
    .search { flex: 1; min-width: 200px; max-width: 380px; padding: 7px 12px; border: 1px solid #ccd3de; border-radius: 6px; font-size: 13px; }
    .search:focus { outline: none; border-color: #2E75B6; }
    .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid #ccd3de; background: #fff; font-size: 12px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .filter-btn:hover, .filter-btn.active { background: #1F4E79; color: #fff; border-color: #1F4E79; }

    /* ── Main content ─────────────────────────────────────── */
    .main { padding: 20px 32px; max-width: 1400px; }
    .section-title { font-size: 15px; font-weight: 700; color: #1F4E79; margin: 24px 0 10px; border-left: 4px solid #2E75B6; padding-left: 10px; }

    /* ── Results table ────────────────────────────────────── */
    .results-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .results-table th { background: #1F4E79; color: #fff; padding: 10px 12px; text-align: left; font-size: 12px; font-weight: 600; white-space: nowrap; }
    .results-table td { padding: 9px 12px; border-bottom: 1px solid #eef1f6; vertical-align: middle; font-size: 13px; }
    .results-table tr.result-row:hover > td { background: #f5f8ff; }
    .results-table tr.result-row { cursor: pointer; }
    .results-table tr.detail-row td { background: #f8fafd; padding: 0; border-bottom: 2px solid #dde3ec; }
    .results-table tr.detail-row.hidden { display: none; }

    /* ── Status badges ───────────────────────────────────── */
    .badge { display: inline-block; padding: 3px 9px; border-radius: 12px; font-size: 11px; font-weight: 700; letter-spacing: 0.3px; }
    .badge-PASS    { background: #E8F5E9; color: #2E7D32; }
    .badge-FAIL    { background: #FFEBEE; color: #C62828; }
    .badge-SKIP    { background: #FFF8E1; color: #F57F17; }
    .badge-PENDING { background: #EEF2F8; color: #555; }
    .badge-enabled      { background: #E8F5E9; color: #2E7D32; }
    .badge-disabled     { background: #FFEBEE; color: #C62828; }
    .badge-pending-cfg  { background: #F3F3F3; color: #777; }
    .badge-quote         { background: #E3F2FD; color: #1565C0; }
    .badge-configuration { background: #F3E5F5; color: #6A1B9A; }
    .badge-skip-rule     { background: #FFF8E1; color: #E65100; }

    /* ── Expand arrow ────────────────────────────────────── */
    .arrow { display: inline-block; width: 16px; transition: transform 0.2s; }
    .arrow.open { transform: rotate(90deg); }

    /* ── Detail panel ────────────────────────────────────── */
    .detail-panel { padding: 16px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 800px) { .detail-panel { grid-template-columns: 1fr; } }
    .detail-section h4 { font-size: 11px; font-weight: 700; color: #2E75B6; text-transform: uppercase; margin-bottom: 6px; }
    .detail-section pre { background: #1e1e2e; color: #cdd6f4; padding: 10px 12px; border-radius: 6px; font-size: 11px; white-space: pre-wrap; word-break: break-all; max-height: 220px; overflow-y: auto; }
    .kv-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .kv-table td { padding: 4px 6px; border-bottom: 1px solid #eef1f6; }
    .kv-table td:first-child { color: #555; width: 40%; font-weight: 600; }
    .error-box { background: #FFEBEE; border-left: 3px solid #E53935; padding: 8px 10px; border-radius: 4px; font-size: 12px; color: #B71C1C; white-space: pre-wrap; }

    /* ── Configuration cards ─────────────────────────────── */
    .config-section-wrap { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 16px; overflow: hidden; }
    .config-section-header { padding: 10px 16px; background: #EEF2F8; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
    .config-section-header h3 { font-size: 13px; font-weight: 700; color: #1F4E79; }
    .config-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; padding: 16px; }
    .config-card { border: 1px solid #dde3ec; border-radius: 8px; padding: 12px 14px; background: #fafcff; }
    .config-card .card-label { font-size: 12px; font-weight: 700; color: #222; margin-bottom: 4px; }
    .config-card .card-value { font-size: 11px; color: #555; font-family: monospace; background: #EEF2F8; padding: 2px 6px; border-radius: 4px; margin-bottom: 6px; display: inline-block; }
    .config-card .card-status { margin-top: 6px; }

    /* ── Empty state ─────────────────────────────────────── */
    .empty { text-align: center; padding: 40px; color: #888; font-size: 13px; }

    /* ── Progress bar ────────────────────────────────────── */
    .progress-wrap { height: 5px; background: rgba(255,255,255,0.3); border-radius: 2px; margin-top: 8px; display: flex; overflow: hidden; }
    .progress-pass { background: #69F0AE; }
    .progress-fail { background: #FF5252; }
    .progress-skip { background: #FFD740; }
  </style>
</head>
<body>

<div class="header">
  <h1>Insurance Quote Automation Report</h1>
  <div class="subtitle" id="hdr-url"></div>
  <div class="run-meta">
    <span>Environment: <strong id="hdr-env"></strong></span>
    <span>Build: <strong id="hdr-build"></strong></span>
    <span>Started: <strong id="hdr-date"></strong></span>
  </div>
  <div class="progress-wrap" id="progress-bar"></div>
</div>

<div class="summary">
  <div class="stat all active" onclick="filterStatus('ALL')">
    All <span id="cnt-all">0</span>
  </div>
  <div class="stat pass" onclick="filterStatus('PASS')">
    <span class="dot"></span> Pass <span id="cnt-pass">0</span>
  </div>
  <div class="stat fail" onclick="filterStatus('FAIL')">
    <span class="dot"></span> Fail <span id="cnt-fail">0</span>
  </div>
  <div class="stat skip" onclick="filterStatus('SKIP')">
    <span class="dot"></span> Skip <span id="cnt-skip">0</span>
  </div>
</div>

<div class="toolbar">
  <input class="search" id="searchBox" type="text"
         placeholder="Search by name, ID, category…" oninput="applyFilters()" />
  <div class="filter-group">
    <button class="filter-btn active" onclick="filterCat('ALL', this)">All Categories</button>
    <button class="filter-btn" onclick="filterCat('quote', this)">Quote</button>
    <button class="filter-btn" onclick="filterCat('configuration', this)">Configuration</button>
    <button class="filter-btn" onclick="filterCat('skip-rule', this)">Skip Rule</button>
  </div>
</div>

<div class="main">
  <div class="section-title">Scenario Results</div>
  <table class="results-table" id="resultsTable">
    <thead>
      <tr>
        <th style="width:28px"></th>
        <th style="width:80px">ID</th>
        <th>Scenario Name</th>
        <th style="width:110px">Category</th>
        <th style="width:80px">Status</th>
        <th style="width:90px">Duration</th>
        <th style="width:70px">Match</th>
      </tr>
    </thead>
    <tbody id="resultsBody"></tbody>
  </table>
  <div id="noResults" class="empty" style="display:none">No results match the current filter.</div>

  <div class="section-title">Current Configurations</div>
  <div id="configsContainer"></div>
</div>

<script>
  // ── DATA — injected by InsuranceQuoteReportGenerator ───────────
  const runInfo = {{RUN_INFO_JSON}};
  const results = {{RESULTS_JSON}};
  const configs  = {{CONFIGS_JSON}};

  // ── State ───────────────────────────────────────────────────────
  let activeStatus = 'ALL';
  let activeCat    = 'ALL';

  // ── Boot ────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', function () {
    renderHeader();
    renderSummary();
    renderResults(results);
    renderConfigs(configs);
  });

  // ── Header ──────────────────────────────────────────────────────
  function renderHeader() {
    document.getElementById('hdr-url').textContent   = runInfo.baseUrl        || '';
    document.getElementById('hdr-env').textContent   = (runInfo.environment   || '').toUpperCase();
    document.getElementById('hdr-build').textContent = runInfo.buildId         || '';
    document.getElementById('hdr-date').textContent  = fmtDate(runInfo.startedAt);

    var pass  = results.filter(function(r){ return r.status === 'PASS'; }).length;
    var fail  = results.filter(function(r){ return r.status === 'FAIL'; }).length;
    var skip  = results.filter(function(r){ return r.status === 'SKIP' || r.status === 'PENDING'; }).length;
    var total = results.length || 1;
    var bar   = document.getElementById('progress-bar');
    bar.innerHTML =
      '<div class="progress-pass" style="width:' + (pass/total*100).toFixed(1) + '%"></div>' +
      '<div class="progress-fail" style="width:' + (fail/total*100).toFixed(1) + '%"></div>' +
      '<div class="progress-skip" style="width:' + (skip/total*100).toFixed(1) + '%"></div>';
  }

  // ── Summary ─────────────────────────────────────────────────────
  function renderSummary() {
    document.getElementById('cnt-all').textContent  = results.length;
    document.getElementById('cnt-pass').textContent = results.filter(function(r){ return r.status === 'PASS'; }).length;
    document.getElementById('cnt-fail').textContent = results.filter(function(r){ return r.status === 'FAIL'; }).length;
    document.getElementById('cnt-skip').textContent = results.filter(function(r){ return r.status === 'SKIP' || r.status === 'PENDING'; }).length;
  }

  // ── Results table ────────────────────────────────────────────────
  function renderResults(data) {
    var tbody = document.getElementById('resultsBody');
    tbody.innerHTML = '';

    if (!data || data.length === 0) {
      document.getElementById('noResults').style.display = '';
      return;
    }

    data.forEach(function(r, i) {
      // Main row
      var tr = document.createElement('tr');
      tr.className = 'result-row';
      tr.dataset.status   = r.status   || 'PENDING';
      tr.dataset.category = r.category || 'quote';
      tr.dataset.name     = ((r.name || '') + ' ' + (r.id || '') + ' ' + (r.description || '')).toLowerCase();
      tr.onclick = function(){ toggleDetail(i); };
      tr.innerHTML =
        '<td><span class="arrow" id="arrow-' + i + '">&#9658;</span></td>' +
        '<td><code style="font-size:11px">' + esc(r.id || 'TC-NA') + '</code></td>' +
        '<td>' + esc(r.name || '') + '</td>' +
        '<td><span class="badge badge-' + (r.category || 'quote') + '">' + esc(r.category || 'quote') + '</span></td>' +
        '<td><span class="badge badge-' + (r.status || 'PENDING') + '">' + esc(r.status || 'PENDING') + '</span></td>' +
        '<td>' + (r.duration ? r.duration + ' ms' : '&mdash;') + '</td>' +
        '<td>' + (r.match === true ? '&#9989;' : r.match === false ? '&#10060;' : '&mdash;') + '</td>';

      // Detail row
      var detailTr = document.createElement('tr');
      detailTr.className = 'detail-row hidden';
      detailTr.id = 'detail-' + i;
      var detailTd = document.createElement('td');
      detailTd.setAttribute('colspan', '7');
      detailTd.innerHTML = buildDetailPanel(r);
      detailTr.appendChild(detailTd);

      tbody.appendChild(tr);
      tbody.appendChild(detailTr);
    });

    document.getElementById('noResults').style.display = 'none';
  }

  function buildDetailPanel(r) {
    var inputObj = safeParseJson(r.input);
    var inputHtml = Object.keys(inputObj).length
      ? '<table class="kv-table">' + Object.entries(inputObj).map(function(kv){
          return '<tr><td>' + esc(kv[0]) + '</td><td>' + esc(String(kv[1])) + '</td></tr>';
        }).join('') + '</table>'
      : '<em style="color:#aaa;font-size:11px">No input captured</em>';

    var configValHtml = Array.isArray(r.configValues) && r.configValues.length
      ? '<table class="kv-table">' + r.configValues.map(function(cv){
          return '<tr><td>' + esc(cv.key) + '</td><td>' + esc(cv.value) + '</td></tr>';
        }).join('') + '</table>'
      : '<em style="color:#aaa;font-size:11px">&mdash;</em>';

    var skipHtml = Array.isArray(r.skipRules) && r.skipRules.length
      ? r.skipRules.map(function(s){
          return '<div style="margin-bottom:4px"><code style="font-size:11px;color:#E65100">' +
            esc(s.code) + '</code> &mdash; ' + esc(s.message || s.description || '') + '</div>';
        }).join('')
      : '<em style="color:#aaa;font-size:11px">None</em>';

    var actualDisplay = trimJson(r.actual, 2000);
    var errorHtml = r.error
      ? '<div class="detail-section" style="grid-column:1/-1"><h4>Error</h4>' +
        '<div class="error-box">' + esc(r.error) + '</div></div>'
      : '';

    return '<div class="detail-panel">' +
      '<div class="detail-section"><h4>Input</h4>' + inputHtml + '</div>' +
      '<div class="detail-section"><h4>Expected</h4><pre>' + esc(r.expected || '&mdash;') + '</pre></div>' +
      '<div class="detail-section"><h4>Actual Response</h4><pre>' + esc(actualDisplay) + '</pre></div>' +
      '<div class="detail-section"><h4>Config Values</h4>' + configValHtml +
        '<h4 style="margin-top:10px">Skip Rules</h4>' + skipHtml + '</div>' +
      errorHtml +
      '</div>';
  }

  function toggleDetail(i) {
    var row   = document.getElementById('detail-' + i);
    var arrow = document.getElementById('arrow-' + i);
    var isHidden = row.classList.contains('hidden');
    row.classList.toggle('hidden', !isHidden);
    arrow.classList.toggle('open', isHidden);
  }

  // ── Configuration cards ──────────────────────────────────────────
  function renderConfigs(data) {
    var container = document.getElementById('configsContainer');
    if (!data || data.length === 0) {
      container.innerHTML = '<div class="empty">No configurations recorded for this run.</div>';
      return;
    }

    // Group by category
    var groups = {};
    data.forEach(function(c) {
      var cat = c.category || 'General';
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(c);
    });

    container.innerHTML = Object.entries(groups).map(function(entry) {
      var cat   = entry[0];
      var items = entry[1];
      return '<div class="config-section-wrap">' +
        '<div class="config-section-header" onclick="toggleConfigGroup(this)">' +
          '<h3>' + esc(cat) + ' <span style="font-weight:400;color:#888;font-size:12px">(' + items.length + ')</span></h3>' +
          '<span style="font-size:12px;color:#888">&#9650; collapse</span>' +
        '</div>' +
        '<div class="config-cards">' + items.map(configCard).join('') + '</div>' +
        '</div>';
    }).join('');
  }

  function configCard(c) {
    var badge, borderColor;
    if (c.enabled === true) {
      badge       = '<span class="badge badge-enabled">Enabled</span>';
      borderColor = '#C8E6C9';
    } else if (c.enabled === false) {
      badge       = '<span class="badge badge-disabled">Disabled</span>';
      borderColor = '#FFCDD2';
    } else {
      badge       = '<span class="badge badge-pending-cfg">Pending</span>';
      borderColor = '#E0E0E0';
    }
    var updated = c.lastUpdated
      ? '<div style="font-size:10px;color:#aaa;margin-top:6px">Updated: ' + esc(c.lastUpdated) + '</div>'
      : '';
    var desc = c.description
      ? '<div style="font-size:11px;color:#666;margin-top:6px">' + esc(c.description) + '</div>'
      : '';
    return '<div class="config-card" style="border-color:' + borderColor + '">' +
      '<div class="card-label">' + esc(c.label || c.key) + '</div>' +
      '<div class="card-value">' + esc(c.value || '&mdash;') + '</div>' +
      '<div class="card-status">' + badge + '</div>' +
      desc + updated +
      '</div>';
  }

  function toggleConfigGroup(header) {
    var cards = header.nextElementSibling;
    var isOpen = cards.style.display !== 'none';
    cards.style.display = isOpen ? 'none' : '';
    header.querySelector('span:last-child').textContent = isOpen ? '\u25BC expand' : '\u25B2 collapse';
  }

  // ── Filters ──────────────────────────────────────────────────────
  function filterStatus(status) {
    activeStatus = status;
    document.querySelectorAll('.stat').forEach(function(el){ el.classList.remove('active'); });
    var map = { 'ALL': 'all', 'PASS': 'pass', 'FAIL': 'fail', 'SKIP': 'skip' };
    var el = document.querySelector('.stat.' + (map[status] || 'all'));
    if (el) el.classList.add('active');
    applyFilters();
  }

  function filterCat(cat, btn) {
    activeCat = cat;
    document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    applyFilters();
  }

  function applyFilters() {
    var query = (document.getElementById('searchBox').value || '').toLowerCase();
    var visible = 0;
    var rows = document.querySelectorAll('#resultsBody .result-row');
    rows.forEach(function(row, i) {
      var statusOk = activeStatus === 'ALL'
        || row.dataset.status === activeStatus
        || (activeStatus === 'SKIP' && (row.dataset.status === 'SKIP' || row.dataset.status === 'PENDING'));
      var catOk    = activeCat === 'ALL' || row.dataset.category === activeCat;
      var searchOk = !query || (row.dataset.name || '').includes(query);
      var show = statusOk && catOk && searchOk;
      row.style.display = show ? '' : 'none';
      var detail = document.getElementById('detail-' + i);
      if (detail && !show) detail.classList.add('hidden');
      if (show) visible++;
    });
    document.getElementById('noResults').style.display = visible === 0 ? '' : 'none';
  }

  // ── Utilities ────────────────────────────────────────────────────
  function esc(str) {
    return String(str == null ? '' : str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function safeParseJson(str) {
    if (!str) return {};
    if (typeof str === 'object') return str;
    try { return JSON.parse(str); } catch(e) { return {}; }
  }

  function trimJson(str, maxLen) {
    if (!str) return '\u2014';
    if (str.length <= maxLen) {
      try { return JSON.stringify(JSON.parse(str), null, 2); } catch(e) { return str; }
    }
    try {
      var pretty = JSON.stringify(JSON.parse(str), null, 2);
      return pretty.length > maxLen ? pretty.substring(0, maxLen) + '\n\u2026 (truncated)' : pretty;
    } catch(e) {
      return str.substring(0, maxLen) + '\u2026 (truncated)';
    }
  }

  function fmtDate(iso) {
    if (!iso) return '\u2014';
    try { return new Date(iso).toLocaleString(); } catch(e) { return iso; }
  }
</script>
</body>
</html>
