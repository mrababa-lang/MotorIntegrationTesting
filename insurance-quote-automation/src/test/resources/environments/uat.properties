# ──────────────────────────────────────────────────────────────────
# Shory Motor UAT — Environment Configuration
# Usage: mvn test -Denv=uat -Dcucumber.filter.tags=@motor
# ──────────────────────────────────────────────────────────────────

base.url=https://motor-uat.shory.com

# Bearer token: supply via CI/CD secret or -DUAT_BEARER_TOKEN=<value>
auth.token=${UAT_BEARER_TOKEN}

# Required for all requests
default.header.custom-lang=AR
api.base.path=/api

# Vehicle identity codes
vehicle.identity.plate=2
vehicle.identity.vcc=3

# Polling configuration for /quote/offers
polling.max.attempts=10
polling.interval.ms=3000

# Legacy endpoints retained for backward compatibility
quote.endpoint=/quote/request
config.endpoint=/config/status
api.key=
client.id=
timeout.connect.ms=5000
timeout.read.ms=15000

# Report output path
report.template.path=report-template/insurance_quote_test_report.html
report.output.dir=target/reports
