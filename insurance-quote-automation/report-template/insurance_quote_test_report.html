<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insurance Quote Automation Report</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #fafafa; }
    h1, h2 { color: #0a3b75; }
    .card { background: #fff; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; }
    code { white-space: pre-wrap; word-wrap: break-word; }
  </style>
</head>
<body>
  <h1>Insurance Quote Automation Test Report</h1>
  <h2>Run Info</h2>
  <div class="card"><code id="runInfo"></code></div>
  <h2>Scenario Results</h2>
  <div class="card"><code id="results"></code></div>
  <h2>Configuration Results</h2>
  <div class="card"><code id="configs"></code></div>
  <script>
    const runInfo = {{RUN_INFO_JSON}};
    const results = {{RESULTS_JSON}};
    const configs = {{CONFIGS_JSON}};
    document.getElementById('runInfo').textContent = JSON.stringify(runInfo, null, 2);
    document.getElementById('results').textContent = JSON.stringify(results, null, 2);
    document.getElementById('configs').textContent = JSON.stringify(configs, null, 2);
  </script>
</body>
</html>
